services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://vocablab:vocablab@db:5432/vocablab
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vocablab
      POSTGRES_PASSWORD: vocablab
      POSTGRES_DB: vocablab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocablab"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
